model_groups:
  cheap_large_context:
    provider: zai
    model: zai/glm-5.1
    description: "Z.AI GLM-5.1 model for high-token stages"

  cheap_large_context_alt:
    provider: zai
    model: zai/glm-5-turbo
    description: "Z.AI GLM-5 Turbo model for alternate critic pass"

  strong_judge:
    provider: github_copilot
    model: github_copilot/gemini-3.1-pro-preview
    description: "GitHub Copilot Gemini 3.1 Pro Preview for validation and scoring"

  fallback_general:
    provider: zai
    model: zai/glm-5
    description: "Z.AI GLM-5 fallback model"

routing:
  critic_a: cheap_large_context
  critic_b: cheap_large_context_alt
  critic_judge: cheap_large_context
  reviser: cheap_large_context
  validator: strong_judge
  scorer: strong_judge
  fallback: fallback_general
